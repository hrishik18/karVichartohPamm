name: Build and deploy React app to Azure Web App - kvtp

on:
  push:
    branches:
      - main
    paths:
      - 'karVichartohPamm/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install and build
        working-directory: karVichartohPamm
        run: |
          npm install
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: karVichartohPamm/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FCB55B8DDE3541B4AC08D656B525AF9C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CAE6FFC3F70A47CFA51E311A037B4841 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C17DED25AB63491795160696751326E6 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kvtp'
          slot-name: 'Production'
          package: .
